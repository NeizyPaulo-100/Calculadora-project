<!DOCTYPE html>
<html lang="pt">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="estilo/estilo.css">
        <script src="script/script.js" defer></script>
        <title>Calculadora</title>
    </head>
    <body>
        <main class="calculadora">
            <input type="text" id="display" disabled>

            <section class="botoes">
                <button id="limpar" class="button-operacao button-c">C</button>
                <button id="porcento" class="button-operacao">%</button>
                <button id="potencia" class="button-operacao">x²</button>
                <button id="dividir" class="button-operacao">÷</button>
                <button id="sete" class="button-numero">7</button>
                <button id="oito" class="button-numero">8</button>
                <button id="nove" class="button-numero">9</button>
                <button id="mutiplicar" class="button-operacao">🞨</button>
                <button id="quatro" class="button-numero">4</button>
                <button id="cinco" class="button-numero">5</button>
                <button id="seis" class="button-numero">6</button>
                <button id="subtrair" class="button-operacao">-</button>
                <button id="um" class="button-numero">1</button>
                <button id="dois" class="button-numero">2</button>
                <button id="tres" class="button-numero">3</button>
                <button id="somar" class="button-operacao">+</button>
                <button id="pi" class="button-numero">π</button>
                <button id="zero" class="button-numero">0</button>
                <button id="ponto" class="button-numero">.</button>
                <button id="igual" class="button-igual">=</button>
            </section>
        </main>
    </body>
</html>
